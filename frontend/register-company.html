<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Company Registration - NearStage</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
  <div class="position-fixed top-0 end-0 p-3">
    <button class="btn btn-outline-light rounded-circle" id="themeToggle" onclick="window.NearStage.toggleTheme()"
      style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
      <i class="fas fa-moon"></i>
    </button>
  </div>
  <div class="auth-card" style="max-width: 600px;">
    <div class="auth-header">
      <i class="fas fa-building"></i>
      <h2>Company Registration</h2>
      <p>Register to post internship opportunities</p>
    </div>
    <div class="auth-body">
      <div class="alert alert-info mb-4">
        <i class="fas fa-info-circle me-2"></i>
        Your account will be reviewed by administrators before you can post internships.
      </div>

      <form id="registerForm">
        <!-- Company Info -->
        <h5 class="mb-3"><i class="fas fa-building me-2"></i>Company Information</h5>

        <div class="mb-3">
          <label class="form-label">Company Name *</label>
          <input type="text" class="form-control" id="companyName" placeholder="Your Company Ltd." required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-control" id="email" placeholder="company@email.com" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="+250788000000">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Industry *</label>
          <select class="form-select" id="industry" required>
            <option value="">Select industry</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Website</label>
          <input type="url" class="form-control" id="website" placeholder="https://company.rw">
        </div>

        <div class="mb-3">
          <label class="form-label">Company Description *</label>
          <textarea class="form-control" id="description" rows="4" placeholder="Tell us about your company..."
            required></textarea>
        </div>

        <!-- Location -->
        <h5 class="mb-3 mt-4"><i class="fas fa-map-marker-alt me-2"></i>Location</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Province *</label>
            <select class="form-select" id="province" required>
              <option value="">Select province</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">District *</label>
            <select class="form-select" id="district" required disabled>
              <option value="">Select district</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Sector</label>
            <input type="text" class="form-control" id="sector" placeholder="Optional">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required
              minlength="6">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" id="address" placeholder="Street address">
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg" id="registerBtn">
            <span class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
            Register Company
          </button>
          <a href="/login.html" class="btn btn-outline-secondary">
            <i class="fas fa-eye me-2"></i> Preview Dashboard (Demo)
          </a>
        </div>
      </form>
    </div>
    <div class="auth-footer">
      <p>Already have an account? <a href="login.html">Login here</a></p>
      <div class="mb-3 mt-4 small text-muted text-uppercase" style="letter-spacing: 1px; font-size: 0.7rem;">
        System Built By <br>
        <strong class="text-primary">MUNEZA HILLO BLANDECO</strong>
      </div>
      <a href="index.html" class="btn btn-link mt-2">
        <i class="fas fa-arrow-left me-1"></i> Back to Home
      </a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="js/main.js"></script>

  <script>
    // Populate industries
    const industrySelect = document.getElementById('industry');
    window.NearStage.industries.forEach(industry => {
      const option = document.createElement('option');
      option.value = industry;
      option.textContent = industry;
      industrySelect.appendChild(option);
    });

    // Populate provinces
    const provinceSelect = document.getElementById('province');
    window.NearStage.provinces.forEach(province => {
      const option = document.createElement('option');
      option.value = province;
      option.textContent = province;
      provinceSelect.appendChild(option);
    });

    // Handle province change
    provinceSelect.addEventListener('change', function () {
      const districtSelect = document.getElementById('district');
      districtSelect.innerHTML = '<option value="">Select district</option>';

      if (this.value && window.NearStage.districtsByProvince[this.value]) {
        window.NearStage.districtsByProvince[this.value].forEach(district => {
          const option = document.createElement('option');
          option.value = district;
          option.textContent = district;
          districtSelect.appendChild(option);
        });
        districtSelect.disabled = false;
      } else {
        districtSelect.disabled = true;
      }
    });

    // Registration form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const companyName = document.getElementById('companyName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value;
      const industry = document.getElementById('industry').value;
      const website = document.getElementById('website').value;
      const description = document.getElementById('description').value;
      const province = document.getElementById('province').value;
      const district = document.getElementById('district').value;
      const sector = document.getElementById('sector').value;
      const address = document.getElementById('address').value;

      const registerBtn = document.getElementById('registerBtn');
      const spinner = registerBtn.querySelector('.spinner-border');

      registerBtn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const result = await window.NearStage.apiCall('/auth/company/register', 'POST', {
          companyName,
          email,
          password,
          phone,
          industry,
          website,
          description,
          location: {
            province,
            district,
            sector,
            address
          }
        });

        window.NearStage.setToken(result.token);
        window.NearStage.setUser(result.user);

        window.NearStage.showToast(result.message || 'Registration successful! Waiting for approval...');

        setTimeout(() => {
          window.location.href = '/company/dashboard.html';
        }, 2000);

      } catch (error) {
        console.warn('Backend not connected, entering Company Demo...');
        // Fake a success for the demo
        const demoUser = { companyName: companyName || 'Company', role: 'company', email: email };
        window.NearStage.setToken('demo_token');
        window.NearStage.setUser(demoUser);
        window.NearStage.showToast('Demo Access: Redirecting to Dashboard...');
        setTimeout(() => { window.location.href = '/company/dashboard.html'; }, 1000);
      } finally {
        registerBtn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>

</html>
