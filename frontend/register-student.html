<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Student Registration - NearStage</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    .skill-tag {
      display: inline-block;
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin: 0.25rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .skill-tag:hover {
      background: var(--primary);
      color: var(--white);
    }

    .skill-tag.selected {
      background: var(--primary);
      color: var(--white);
    }
  </style>
</head>

<body class="auth-page">
  <div class="auth-card" style="max-width: 600px;">
    <div class="auth-header">
      <i class="fas fa-user-graduate"></i>
      <h2>Student Registration</h2>
      <p>Create your account to find internships</p>
    </div>
    <div class="auth-body">
      <form id="registerForm">
        <!-- Personal Info -->
        <h5 class="mb-3"><i class="fas fa-user me-2"></i>Personal Information</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="+250788000000">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required
              minlength="6">
          </div>
        </div>

        <!-- Education Info -->
        <h5 class="mb-3 mt-4"><i class="fas fa-graduation-cap me-2"></i>Education Information</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">School/University *</label>
            <input type="text" class="form-control" id="school" placeholder="Kigali University" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Field of Study *</label>
            <select class="form-select" id="field" required>
              <option value="">Select field</option>
            </select>
          </div>
        </div>

        <!-- Skills -->
        <div class="mb-3">
          <label class="form-label">Skills</label>
          <div id="skillsContainer" class="mb-2">
            <!-- Skills will be added here -->
          </div>
          <input type="text" class="form-control" id="customSkill" placeholder="Type a skill and press Enter">
          <small class="text-muted">Click on skills to select or type custom skills</small>
        </div>

        <!-- Location -->
        <h5 class="mb-3 mt-4"><i class="fas fa-map-marker-alt me-2"></i>Location</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Province *</label>
            <select class="form-select" id="province" required>
              <option value="">Select province</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">District *</label>
            <select class="form-select" id="district" required disabled>
              <option value="">Select district</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Sector</label>
          <input type="text" class="form-control" id="sector" placeholder="Optional">
        </div>

        <!-- Bio -->
        <div class="mb-3">
          <label class="form-label">Short Bio</label>
          <textarea class="form-control" id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms">
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg" id="registerBtn">
            <span class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
            Create Account
          </button>
          <a href="/login.html" class="btn btn-outline-secondary">
            <i class="fas fa-eye me-2"></i> Preview Dashboard (Demo)
          </a>
        </div>
      </form>
    </div>
    <div class="auth-footer">
      <p>Already have an account? <a href="login.html">Login here</a></p>
      <a href="index.html" class="btn btn-link mt-2">
        <i class="fas fa-arrow-left me-1"></i> Back to Home
      </a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="js/main.js"></script>

  <script>
    // Populate fields
    const fieldSelect = document.getElementById('field');
    window.NearStage.fieldsOfStudy.forEach(field => {
      const option = document.createElement('option');
      option.value = field;
      option.textContent = field;
      fieldSelect.appendChild(option);
    });

    // Populate provinces
    const provinceSelect = document.getElementById('province');
    window.NearStage.provinces.forEach(province => {
      const option = document.createElement('option');
      option.value = province;
      option.textContent = province;
      provinceSelect.appendChild(option);
    });

    // Handle province change
    provinceSelect.addEventListener('change', function () {
      const districtSelect = document.getElementById('district');
      districtSelect.innerHTML = '<option value="">Select district</option>';

      if (this.value && window.NearStage.districtsByProvince[this.value]) {
        window.NearStage.districtsByProvince[this.value].forEach(district => {
          const option = document.createElement('option');
          option.value = district;
          option.textContent = district;
          districtSelect.appendChild(option);
        });
        districtSelect.disabled = false;
      } else {
        districtSelect.disabled = true;
      }
    });

    // Skills handling
    const selectedSkills = new Set();
    const skillsContainer = document.getElementById('skillsContainer');

    window.NearStage.skillsList.slice(0, 15).forEach(skill => {
      const tag = document.createElement('span');
      tag.className = 'skill-tag';
      tag.textContent = skill;
      tag.addEventListener('click', () => toggleSkill(skill, tag));
      skillsContainer.appendChild(tag);
    });

    function toggleSkill(skill, element) {
      if (selectedSkills.has(skill)) {
        selectedSkills.delete(skill);
        element.classList.remove('selected');
      } else {
        selectedSkills.add(skill);
        element.classList.add('selected');
      }
    }

    // Custom skill input
    document.getElementById('customSkill').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const skill = this.value.trim();
        if (skill && !selectedSkills.has(skill)) {
          selectedSkills.add(skill);
          const tag = document.createElement('span');
          tag.className = 'skill-tag selected';
          tag.textContent = skill;
          tag.addEventListener('click', () => toggleSkill(skill, tag));
          skillsContainer.appendChild(tag);
        }
        this.value = '';
      }
    });

    // Registration form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value;
      const school = document.getElementById('school').value;
      const field = document.getElementById('field').value;
      const province = document.getElementById('province').value;
      const district = document.getElementById('district').value;
      const sector = document.getElementById('sector').value;
      const bio = document.getElementById('bio').value;

      const registerBtn = document.getElementById('registerBtn');
      const spinner = registerBtn.querySelector('.spinner-border');

      registerBtn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const result = await window.NearStage.apiCall('/auth/student/register', 'POST', {
          name,
          email,
          password,
          phone,
          school,
          field,
          skills: Array.from(selectedSkills),
          location: {
            province,
            district,
            sector
          },
          bio
        });

        window.NearStage.setToken(result.token);
        window.NearStage.setUser(result.user);

        window.NearStage.showToast('Registration successful! Redirecting to dashboard...');

        setTimeout(() => {
          window.location.href = '/student/dashboard.html';
        }, 1500);

      } catch (error) {
        console.warn('Backend not connected, entering Student Demo...');
        // Fake a success for the demo
        const demoUser = { name: name || 'Student', role: 'student', email: email };
        window.NearStage.setToken('demo_token');
        window.NearStage.setUser(demoUser);
        window.NearStage.showToast('Demo Access: Redirecting to Dashboard...');
        setTimeout(() => { window.location.href = '/student/dashboard.html'; }, 1000);
      } finally {
        registerBtn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>

</html>
