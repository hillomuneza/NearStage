<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background (optional - remove for transparent) -->
  <rect width="400" height="120" fill="none"/>
  
  <!-- Graduation Cap Icon -->
  <g transform="translate(20, 25)">
    <!-- Cap base -->
    <path d="M0 35 L35 15 L70 35 L70 45 L0 45 Z" fill="url(#grad1)"/>
    <!-- Cap top (diamond shape) -->
    <path d="M10 15 L35 0 L60 15 L35 25 Z" fill="url(#grad1)"/>
    <!-- Tassel -->
    <line x1="35" y1="5" x2="35" y2="45" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="35" cy="45" r="4" fill="#fbbf24"/>
    <!-- Tassel end -->
    <path d="M35 45 Q45 55 35 65 Q25 55 35 45" fill="#fbbf24"/>
  </g>
  
  <!-- Text: RIAPMS -->
  <text x="110" y="55" font-family="Poppins, Arial, sans-serif" font-size="36" font-weight="700" fill="#1e293b">RIAPMS</text>
  
  <!-- Tagline -->
  <text x="112" y="78" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">Rwanda Internship & Academic Placement</text>
  
  <!-- Slogan -->
  <text x="110" y="100" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="600" fill="#2563eb" letter-spacing="1">BUILDING RWANDA'S FUTURE WORKFORCE</text>
</svg>
