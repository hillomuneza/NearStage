<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Browse Internships - NearStage</title>

    <!-- PWA -->
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../assets/icon-192.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark dashboard-nav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-graduation-cap me-2"></i>NearStage
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-home me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="internships.html">
                            <i class="fas fa-briefcase me-1"></i> Browse Internships
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="applications.html">
                            <i class="fas fa-file-alt me-1"></i> My Applications
                        </a>
                    </li>
                    <li class="nav-item ms-3">
                        <div class="dropdown">
                            <button class="btn btn-outline-light dropdown-toggle" type="button"
                                data-bs-toggle="dropdown">
                                <div class="user-avatar"
                                    style="width: 32px; height: 32px; display: inline-flex; margin-right: 8px;">
                                    <span id="userInitials">JD</span>
                                </div>
                                <span id="userName">John</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="profile.html"><i
                                            class="fas fa-user me-2"></i>Profile</a></li>
                                <li><a class="dropdown-item" href="settings.html"><i
                                            class="fas fa-cog me-2"></i>Settings</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#"
                                        onclick="window.NearStage.logout(); return false;"><i
                                            class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="dashboard-content">
        <div class="container">
            <div class="row mb-4">
                <div class="col-12">
                    <h2><i class="fas fa-search me-2"></i>Browse Internships</h2>
                    <p class="text-muted">Find internship opportunities that match your skills and location</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="filter-section">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Field</label>
                        <select class="form-select" id="filterField">
                            <option value="">All Fields</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Province</label>
                        <select class="form-select" id="filterProvince">
                            <option value="">All Provinces</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">District</label>
                        <select class="form-select" id="filterDistrict" disabled>
                            <option value="">All Districts</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-primary w-100" onclick="applyFilters()">
                            <i class="fas fa-filter me-2"></i>Apply Filters
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <ul class="nav nav-tabs mb-4" id="internshipTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="matched-tab" data-bs-toggle="tab" data-bs-target="#matched"
                        type="button">
                        <i class="fas fa-magic me-2"></i>Smart Matched
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="all-tab" data-bs-toggle="tab" data-bs-target="#all" type="button">
                        <i class="fas fa-list me-2"></i>All Internships
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="internshipTabsContent">
                <div class="tab-pane fade show active" id="matched" role="tabpanel">
                    <div id="matchedList">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Loading matched internships...</p>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="all" role="tabpanel">
                    <div id="allList">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Loading all internships...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../js/main.js"></script>

    <script>
        // Check authentication
        if (!window.NearStage.requireAuth()) { }

        // Load user
        const user = window.NearStage.getUser();
        if (user) {
            document.getElementById('userInitials').textContent = window.NearStage.getInitials(user.name || 'Student');
            document.getElementById('userName').textContent = user.name || 'Student';
        }

        // Populate filter options
        const fieldSelect = document.getElementById('filterField');
        window.NearStage.fieldsOfStudy.forEach(field => {
            const option = document.createElement('option');
            option.value = field;
            option.textContent = field;
            fieldSelect.appendChild(option);
        });

        const provinceSelect = document.getElementById('filterProvince');
        window.NearStage.provinces.forEach(province => {
            const option = document.createElement('option');
            option.value = province;
            option.textContent = province;
            provinceSelect.appendChild(option);
        });

        // Handle province filter change
        document.getElementById('filterProvince').addEventListener('change', function () {
            const districtSelect = document.getElementById('filterDistrict');
            districtSelect.innerHTML = '<option value="">All Districts</option>';

            if (this.value && window.NearStage.districtsByProvince[this.value]) {
                window.NearStage.districtsByProvince[this.value].forEach(district => {
                    const option = document.createElement('option');
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
                districtSelect.disabled = false;
            } else {
                districtSelect.disabled = true;
            }
        });

        // Apply filters
        function applyFilters() {
            loadInternships();
        }

        // Render internship card
        function renderInternshipCard(internship, showMatch = false) {
            const company = internship.companyId || {};
            const matchScore = internship.matchScore || 0;
            let matchBadgeClass = 'match-low';
            if (matchScore >= 70) matchBadgeClass = 'match-high';
            else if (matchScore >= 40) matchBadgeClass = 'match-medium';

            const isApplied = internship.applied || false;

            return `
        <div class="internship-card">
          <div class="d-flex justify-content-between align-items-start">
            <div class="d-flex gap-3">
              <div class="company-logo">
                <i class="fas fa-building"></i>
              </div>
              <div>
                <h5 class="mb-1">${internship.title}</h5>
                <div class="company-name">${company.companyName || 'Company'}</div>
                <div class="meta-info">
                  <span><i class="fas fa-map-marker-alt"></i> ${internship.location?.district || ''}, ${internship.location?.province || ''}</span>
                  <span><i class="fas fa-clock"></i> ${internship.duration || ''}</span>
                  <span><i class="fas fa-book"></i> ${internship.field || ''}</span>
                  <span><i class="fas fa-users"></i> ${internship.positions - (internship.filledPositions || 0)} positions</span>
                </div>
              </div>
            </div>
            <div class="text-end">
              ${showMatch ? `<span class="match-badge ${matchBadgeClass}">${matchScore}% Match</span>` : ''}
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary btn-sm" onclick="viewInternship('${internship._id}')">
              <i class="fas fa-eye me-1"></i>View Details
            </button>
            ${isApplied ?
                    '<span class="badge bg-success"><i class="fas fa-check me-1"></i>Applied</span>' :
                    `<button class="btn btn-outline-primary btn-sm" onclick="quickApply('${internship._id}')">
                <i class="fas fa-paper-plane me-1"></i>Quick Apply
              </button>`
                }
          </div>
        </div>
      `;
        }

        // View internship details
        function viewInternship(id) {
            window.location.href = `internship-details.html?id=${id}`;
        }

        // Quick apply
        async function quickApply(id) {
            if (!confirm('Apply for this internship?')) return;

            try {
                await window.NearStage.apiCall(`/internships/student/apply/${id}`, 'POST', {});
                window.NearStage.showToast('Application submitted successfully!');
                loadInternships();
            } catch (error) {
                window.NearStage.showToast(error.message, 'error');
            }
        }

        // Load internships
        async function loadInternships() {
            try {
                // Load matched
                const matched = await window.NearStage.apiCall('/internships/student/matched');
                document.getElementById('matchedList').innerHTML = matched.length ?
                    matched.map(i => renderInternshipCard(i, true)).join('') :
                    '<div class="text-center py-5"><p class="text-muted">No matched internships found</p></div>';

                // Load all with filters
                const field = document.getElementById('filterField').value;
                const province = document.getElementById('filterProvince').value;
                const district = document.getElementById('filterDistrict').value;

                let query = '?';
                if (field) query += `field=${field}&`;
                if (province) query += `province=${province}&`;
                if (district) query += `district=${district}&`;

                const all = await window.NearStage.apiCall(`/internships/student/search${query}`);

                // Get user's applications
                const applications = await window.NearStage.apiCall('/internships/student/applications');
                const appliedIds = applications.map(a => a.internship._id);

                all.forEach(i => i.applied = appliedIds.includes(i._id));

                document.getElementById('allList').innerHTML = all.length ?
                    all.map(i => renderInternshipCard(i, false)).join('') :
                    '<div class="text-center py-5"><p class="text-muted">No internships found matching your criteria</p></div>';

            } catch (error) {
                console.warn('API connection failed. Loading Demo Internships...');

                // Mock matched internships
                const mockMatched = [
                    {
                        _id: 'mock1',
                        title: 'Junior Web Developer',
                        companyId: { companyName: 'Kigali Digital Hub' },
                        location: { province: 'Kigali City', district: 'Gasabo' },
                        duration: '3 Months',
                        field: 'Computer Science',
                        positions: 3,
                        filledPositions: 1,
                        matchScore: 92,
                        applied: false
                    },
                    {
                        _id: 'mock2',
                        title: 'Agricultural Assistant',
                        companyId: { companyName: 'Rwanda Green Farms' },
                        location: { province: 'Northern Province', district: 'Musanze' },
                        duration: '6 Months',
                        field: 'Agriculture',
                        positions: 5,
                        filledPositions: 2,
                        matchScore: 85,
                        applied: true
                    }
                ];

                // Mock all internships
                const mockAll = [
                    ...mockMatched,
                    {
                        _id: 'mock3',
                        title: 'Accountant Intern',
                        companyId: { companyName: 'Kigali Finance Ltd' },
                        location: { province: 'Kigali City', district: 'Nyarugenge' },
                        duration: '4 Months',
                        field: 'Finance',
                        positions: 2,
                        filledPositions: 0,
                        matchScore: 65,
                        applied: false
                    }
                ];

                document.getElementById('matchedList').innerHTML = mockMatched.map(i => renderInternshipCard(i, true)).join('');
                document.getElementById('allList').innerHTML = mockAll.map(i => renderInternshipCard(i, false)).join('');

                window.NearStage.showToast('Demo Mode: Showing sample internships', 'info');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadInternships);
    </script>
</body>

</html>
