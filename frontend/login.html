<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Login - NearStage</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-sign-in-alt"></i>
      <h2>Welcome Back</h2>
      <p>Login to your NearStage account</p>
    </div>
    <div class="auth-body">
      <!-- Role Selection -->
      <div class="mb-4">
        <label class="form-label">I am a</label>
        <select id="userRole" class="form-select">
          <option value="student">Student</option>
          <option value="company">Company</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="rememberMe">
          <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
            <span class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
            Login
          </button>
          <button type="button" class="btn btn-outline-secondary" onclick="loginDemo()">
            <i class="fas fa-desktop me-2"></i> Try Demo Mode
          </button>
        </div>
      </form>
    </div>
    <div class="auth-footer">
      <p>Don't have an account?
        <a href="register-student.html">Register as Student</a> or
        <a href="register-company.html">Register as Company</a>
      </p>
      <a href="index.html" class="btn btn-link mt-2">
        <i class="fas fa-arrow-left me-1"></i> Back to Home
      </a>
      <div class="mt-3">
        <a href="privacy.html" class="small text-muted me-3">Privacy Policy</a>
        <a href="terms.html" class="small text-muted me-3">Terms of Service</a>
        <a href="faq.html" class="small text-muted">FAQ</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="js/main.js"></script>

  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('userRole').value;

      const loginBtn = document.getElementById('loginBtn');
      const spinner = loginBtn.querySelector('.spinner-border');

      loginBtn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const endpoint = role === 'admin' ? '/admin/login' : `/${role}/login`;
        const result = await window.NearStage.apiCall(`/auth${endpoint}`, 'POST', { email, password });

        window.NearStage.setToken(result.token);
        window.NearStage.setUser(result.user);

        window.NearStage.showToast('Login successful! Redirecting...');

        // Redirect based on actual user role from API response
        const userRole = result.user.role || role;
        setTimeout(() => {
          if (userRole === 'admin' || userRole === 'super_admin') {
            window.location.href = '/admin/dashboard.html';
          } else if (userRole === 'company') {
            window.location.href = '/company/dashboard.html';
          } else {
            window.location.href = '/student/dashboard.html';
          }
        }, 1000);

      } catch (error) {
        console.warn('Backend not connected, entering Demo Mode automatically...');
        loginDemo(); // Use the demo fallback so the user can see the pages
      } finally {
        loginBtn.disabled = false;
        spinner.classList.add('d-none');
      }
    });

    // Change role endpoint based on selection
    document.getElementById('userRole').addEventListener('change', function () {
      // Update placeholder text
      const emailInput = document.getElementById('email');
      if (this.value === 'admin') {
        emailInput.placeholder = 'admin@riapms.rw';
      } else if (this.value === 'company') {
        emailInput.placeholder = 'company@email.com';
      } else {
        emailInput.placeholder = 'your@email.com';
      }
    });
    // Demo Login Bypass
    function loginDemo() {
      const role = document.getElementById('userRole').value;
      const demoUser = {
        name: 'Demo User',
        email: 'demo@nearstage.com',
        role: role
      };

      window.NearStage.setToken('demo_token_123');
      window.NearStage.setUser(demoUser);

      window.NearStage.showToast('Entering Demo Mode...', 'info');

      setTimeout(() => {
        if (role === 'admin') window.location.href = '/admin/dashboard.html';
        else if (role === 'company') window.location.href = '/company/dashboard.html';
        else window.location.href = '/student/dashboard.html';
      }, 1000);
    }
  </script>
</body>

</html>
