<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>My Internships - NearStage</title>
  
  <!-- PWA -->
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/icon-192.png">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark dashboard-nav">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="fas fa-graduation-cap me-2"></i>NearStage
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">
              <i class="fas fa-home me-1"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="post-internship.html">
              <i class="fas fa-plus-circle me-1"></i> Post Internship
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="my-internships.html">
              <i class="fas fa-list me-1"></i> My Posts
            </a>
          </li>
          <li class="nav-item ms-3">
            <div class="dropdown">
              <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <div class="user-avatar" style="width: 32px; height: 32px; display: inline-flex; margin-right: 8px;">
                  <span id="userInitials">CO</span>
                </div>
                <span id="userName">Company</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="profile.html"><i class="fas fa-building me-2"></i>Company Profile</a></li>
                <li><a class="dropdown-item" href="settings.html"><i class="fas fa-cog me-2"></i>Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="window.NearStage.logout(); return false;"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
              </ul>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- My Internships Content -->
  <div class="dashboard-content">
    <div class="container">
      <!-- Header -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="dashboard-card">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h3><i class="fas fa-list me-2 text-primary"></i>My Internship Posts</h3>
                <p class="text-muted mb-0">Manage your posted internships and view applicants</p>
              </div>
              <a href="post-internship.html" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Post New
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-icon" style="background: rgba(37, 99, 235, 0.1); color: #2563eb;">
              <i class="fas fa-briefcase"></i>
            </div>
            <div class="stat-number" id="totalPosts">0</div>
            <div class="stat-label">Total Posts</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
              <i class="fas fa-users"></i>
            </div>
            <div class="stat-number" id="totalApplicants">0</div>
            <div class="stat-label">Total Applicants</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
              <i class="fas fa-user-check"></i>
            </div>
            <div class="stat-number" id="acceptedCount">0</div>
            <div class="stat-label">Accepted</div>
          </div>
        </div>
      </div>

      <!-- Internships List -->
      <div class="row">
        <div class="col-12">
          <div class="dashboard-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4><i class="fas fa-building me-2 text-primary"></i>All Posts</h4>
              <div class="btn-group">
                <button class="btn btn-outline-primary btn-sm active" onclick="filterInternships('all')">All</button>
                <button class="btn btn-outline-success btn-sm" onclick="filterInternships('open')">Open</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="filterInternships('closed')">Closed</button>
              </div>
            </div>
            
            <div id="internshipsList">
              <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Loading internships...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="../js/main.js"></script>
  
  <script>
    let allInternships = [];
    let currentFilter = 'all';

    // Check authentication
    if (!window.NearStage.requireAuth()) {}

    // Load user data
    const user = window.NearStage.getUser();
    if (user) {
      document.getElementById('userInitials').textContent = window.NearStage.getInitials(user.companyName || 'Company');
      document.getElementById('userName').textContent = user.companyName || 'Company';
    }

    // Load internships
    async function loadInternships() {
      try {
        const internships = await window.NearStage.apiCall('/internships/company/internships');
        allInternships = internships;
        
        // Update stats
        document.getElementById('totalPosts').textContent = internships.length;
        
        let totalApplicants = 0;
        let acceptedCount = 0;
        
        internships.forEach(internship => {
          totalApplicants += internship.applicants?.length || 0;
          acceptedCount += internship.applicants?.filter(a => a.status === 'accepted').length || 0;
        });
        
        document.getElementById('totalApplicants').textContent = totalApplicants;
        document.getElementById('acceptedCount').textContent = acceptedCount;
        
        renderInternships();
      } catch (error) {
        console.error('Error loading internships:', error);
        document.getElementById('internshipsList').innerHTML = `
          <div class="alert alert-warning">
            Unable to load internships. Please try again later.
          </div>
        `;
      }
    }

    function renderInternships() {
      const container = document.getElementById('internshipsList');
      const filtered = currentFilter === 'all' 
        ? allInternships 
        : allInternships.filter(i => i.status === currentFilter);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center py-4">
            <i class="fas fa-briefcase fa-3x text-muted mb-3"></i>
            <p class="text-muted">No internships found</p>
            <a href="post-internship.html" class="btn btn-primary">Post New Internship</a>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(internship => {
        const applicantCount = internship.applicants?.length || 0;
        const acceptedCount = internship.applicants?.filter(a => a.status === 'accepted').length || 0;
        
        let statusClass = 'bg-success';
        let statusText = 'Open';
        if (internship.status === 'closed') {
          statusClass = 'bg-secondary';
          statusText = 'Closed';
        }

        return `
          <div class="internship-card">
            <div class="d-flex justify-content-between align-items-start">
              <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <h5 class="mb-1">${internship.title}</h5>
                    <div class="meta-info">
                      <span><i class="fas fa-map-marker-alt"></i> ${internship.location?.district || ''}, ${internship.location?.province || ''}</span>
                      <span><i class="fas fa-clock"></i> ${internship.duration || ''}</span>
                      <span><i class="fas fa-book"></i> ${internship.field || ''}</span>
                    </div>
                  </div>
                  <span class="badge ${statusClass}">${statusText}</span>
                </div>
                
                <div class="row g-3 mt-3">
                  <div class="col-md-3">
                    <div class="text-center p-2 bg-light rounded">
                      <div class="fs-5 fw-bold">${internship.positions}</div>
                      <div class="small text-muted">Positions</div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="text-center p-2 bg-light rounded">
                      <div class="fs-5 fw-bold">${internship.filledPositions || 0}</div>
                      <div class="small text-muted">Filled</div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="text-center p-2 bg-light rounded">
                      <div class="fs-5 fw-bold text-primary">${applicantCount}</div>
                      <div class="small text-muted">Applicants</div>
                    </div>
                  </div>
                  <div class="col-md-3">
                    <div class="text-center p-2 bg-light rounded">
                      <div class="fs-5 fw-bold text-success">${acceptedCount}</div>
                      <div class="small text-muted">Accepted</div>
                    </div>
                  </div>
                </div>

                <div class="mt-3">
                  <small class="text-muted">
                    <i class="fas fa-calendar-alt me-1"></i>Posted on ${window.NearStage.formatDate(internship.createdAt)}
                    ${internship.deadline ? `<span class="ms-3"><i class="fas fa-calendar-times me-1"></i>Deadline: ${window.NearStage.formatDate(internship.deadline)}</span>` : ''}
                  </small>
                </div>
              </div>
            </div>
            
            <div class="mt-3 d-flex gap-2">
              <a href="internship-applicants.html?id=${internship._id}" class="btn btn-outline-primary btn-sm">
                <i class="fas fa-users me-1"></i>View Applicants
              </a>
              <button class="btn btn-outline-secondary btn-sm" onclick="toggleStatus('${internship._id}', '${internship.status}')">
                <i class="fas fa-toggle-${internship.status === 'open' ? 'on' : 'off'} me-1"></i>
                ${internship.status === 'open' ? 'Close' : 'Open'}
              </button>
              <button class="btn btn-outline-danger btn-sm" onclick="deleteInternship('${internship._id}')">
                <i class="fas fa-trash me-1"></i>Delete
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterInternships(filter) {
      currentFilter = filter;
      
      // Update button states
      document.querySelectorAll('.btn-group .btn').forEach(btn => {
        btn.classList.remove('active');
      });
      
      // Set active button
      const buttons = document.querySelectorAll('.btn-group .btn');
      if (filter === 'all') buttons[0].classList.add('active');
      else if (filter === 'open') buttons[1].classList.add('active');
      else if (filter === 'closed') buttons[2].classList.add('active');
      
      renderInternships();
    }

    async function toggleStatus(internshipId, currentStatus) {
      const newStatus = currentStatus === 'open' ? 'closed' : 'open';
      
      try {
        await window.NearStage.apiCall(`/internships/company/internship/${internshipId}`, 'PUT', { status: newStatus });
        window.NearStage.showToast(`Internship ${newStatus === 'open' ? 'opened' : 'closed'} successfully`, 'success');
        loadInternships();
      } catch (error) {
        console.error('Error updating status:', error);
        window.NearStage.showToast('Failed to update status', 'error');
      }
    }

    async function deleteInternship(internshipId) {
      if (!confirm('Are you sure you want to delete this internship? This action cannot be undone.')) {
        return;
      }

      try {
        await window.NearStage.apiCall(`/internships/company/internship/${internshipId}`, 'DELETE');
        window.NearStage.showToast('Internship deleted successfully', 'success');
        loadInternships();
      } catch (error) {
        console.error('Error deleting internship:', error);
        window.NearStage.showToast('Failed to delete internship', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadInternships);
  </script>
</body>
</html>
